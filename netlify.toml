# Netlify config — static site in public/, dynamic API/admin via one Function.
[build]
  publish = "public"
  functions = "netlify/functions"
  command = ""

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@neondatabase/serverless"]

# Route the app's dynamic paths to the Express-in-a-Function.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
